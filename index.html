<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#00e5ff">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="apple-touch-icon" href="icon-192.png">
    <title>Manutenzione Acquario con piante by Giorgio L.</title>
    <style>
        :root {
            --primary: #006064; /* Deep Cyan */
            --primary-light: #4dd0e1;
            --accent: #00e5ff;
            --bg-dark: #001f3f; /* Deep Ocean */
            --bg-gradient: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #b2ebf2;
            --danger: #ff5252;
            --success: #69f0ae;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Sfondo animato con bolle */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 10s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Header */
        header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .current-date {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Main Content Area */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 5;
            padding: 20px;
            padding-bottom: 90px; /* Space for bottom nav */
        }

        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Monthly Calendar Styles */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .month-nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(40px, 1fr));   /* ← chiave: minimo 40px per colonna */
            gap: 8px;
            text-align: center;
        }

        .weekday {
			font-size: 0.75rem;
			color: var(--text-muted);
			margin-bottom: 5px;
			white-space: nowrap;          /* impedisce a capo */
			overflow: hidden;             /* nasconde testo troppo lungo */
			text-overflow: ellipsis;      /* mette ... se proprio non entra */
			min-width: 0;                 /* permette di restringersi davvero */
		}


        .day-cell {
            aspect-ratio: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-cell.today {
			border-color: var(--accent);
			box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
			background: linear-gradient(135deg, rgba(0, 229, 255, 0.12), rgba(0, 229, 255, 0.05));
			font-weight: 700;
			font-size: 1.1rem;              /* numero più grande */
			color: var(--accent);           /* testo cyan brillante */
			transform: scale(1.05);         /* leggermente ingrandito */
			transition: all 0.3s ease;
			animation: pulse-glow 3s infinite ease-in-out;
		}

		.day-cell.today:hover {
			transform: scale(1.08);
			box-shadow: 0 0 20px rgba(0, 229, 255, 0.7);
		}

		@keyframes pulse-glow {
			0% { box-shadow: 0 0 12px rgba(0, 229, 255, 0.5); }
			50% { box-shadow: 0 0 25px rgba(0, 229, 255, 0.9); }
			100% { box-shadow: 0 0 12px rgba(0, 229, 255, 0.5); }
		}


        .day-cell.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Indicator dots for tasks */
        .task-dots {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

		/* Indicator dots for tasks (solo per i futuri) */
		.future-dot {
			width: 10px;
			height: 10px;
			background-color: var(--primary-light);
			border-radius: 50%;
		}

		.check-indicator {
			width: 10px;
			height: 10px;
			background-color: var(--primary-light); /* BLU per "Da Fare" */
			border-radius: 3px;
			color: white;
			font-size: 9px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.check-indicator.completed {
			width: 10px;
			height: 10px;
			background-color: var(--success); /* VERDE per "Fatto" */
			border-radius: 50%;
			font-size: 9px;
		}

        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--primary-light); /* BLU per "Da Fare" */
        }

        .dot.missing {
            background-color: var(--success); /* VERDE per "Fatto" */
        }
		


        /* Daily Task List Styles */
        .task-card {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .task-card:active {
            transform: scale(0.98);
        }

        .task-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 229, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: var(--accent);
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .task-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .check-btn {
            width: 32px;
            height: 32px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-card.completed {
            opacity: 0.6;
        }

        .task-card.completed .check-btn {
            background: var(--success);
            border-color: var(--success);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
        }

        /* Bottom Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 32, 39, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(105, 240, 174, 0.9);
            color: #003300;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
            padding-bottom: 20px;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
		
		.current-date {
			margin-top: 8px;
			font-size: 1.1rem;                  /* più grande del precedente 0.9rem */
			font-weight: 700;                   /* grassetto deciso */
			color: var(--accent);               /* cyan brillante #00e5ff */
			letter-spacing: 0.8px;
			text-shadow: 
				0 0 8px rgba(0, 229, 255, 0.6), 
				0 0 15px rgba(0, 229, 255, 0.3); /* glow morbido */
			background: linear-gradient(90deg, rgba(0,229,255,0.08), rgba(0,229,255,0.03));
			padding: 6px 14px;
			border-radius: 12px;
			display: inline-block;
			
			transition: all 0.4s ease;
			animation: soft-pulse 6s infinite ease-in-out;
		}
		@keyframes soft-pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.25; }
		}


		.current-date:hover {
			transform: scale(1.02);
			text-shadow: 
				0 0 12px rgba(0, 229, 255, 0.9), 
				0 0 20px rgba(0, 229, 255, 0.5);
			box-shadow: 0 4px 15px rgba(0, 229, 255, 0.25);
		}

    </style>
</head>
<body>

    <!-- Animated Background Elements -->
    <div id="bubbles"></div>

    <header>
        <h1>🐠🐟 Manutenzione Acquario 🌱🌿</h1>
        <div style="text-align: center; margin-top: 5px;">
			<div class="current-date" id="headerDate">Caricamento...</div>
		</div>
		<div style="margin-top: 12px; text-align: center; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
				<button id="exportBtn" style="padding: 12px 12px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 600; cursor: pointer;">
					Esporta dati
				</button>
				<label for="importFile" style="padding: 12px 12px; background: var(--primary-light); color: white; border: none;border-radius: 18px; font-weight: 600; cursor: pointer;">
					Importa dati
				</label>
				<input type="file" id="importFile" accept=".json" style="display: none;">
			</div>
    </header>

    <main>
	
		<!-- AGENDA / LISTA GIORNI -->
		<section id="agendaView" class="view-section">
			<div id="agendaList" style="padding-bottom: 100px;">
				<!-- Generato via JS -->
			</div>
		</section>
		
		
        <!-- CALENDARIO MENSILE -->
        <section id="monthView" class="view-section active">
		
			
			
            <div class="calendar-header">
                <button class="month-nav-btn" id="prevMonth">&lt;</button>
                <h2 id="currentMonthLabel">Mese</h2>
                <button class="month-nav-btn" id="nextMonth">&gt;</button>
            </div>
            
            <div class="calendar-grid">
                <div class="weekday">Lun</div>
                <div class="weekday">Mar</div>
                <div class="weekday">Mer</div>
                <div class="weekday">Gio</div>
                <div class="weekday">Ven</div>
                <div class="weekday">Sab</div>
                <div class="weekday">Dom</div>
            </div>
            <div class="calendar-grid" id="daysContainer">
                <!-- Days generated by JS -->
            </div>

            <div class="legend">
                <span>✓ Fatto</span>
				<span>X Dimenticato</span>
				<span>🌱 Flourish (Microelementi)</span>
				<span>🧪 Excel CO₂ (Carbonio)</span>
				<span>🧼 Filtri puliti</span>
				<span>🚿 Cambio acqua</span>
				
            </div>
        </section>

        <!-- VISTA GIORNALIERA -->
        <section id="dayView" class="view-section">
            <div style="margin-bottom: 15px; font-weight: 600; color: var(--text-muted);">
                Attività del <span id="selectedDayLabel" style="color: var(--accent);"></span>
            </div>
            <div id="taskList">
                <!-- Tasks generated by JS -->
            </div>
			<div style="margin-top: 24px; padding: 16px; background: var(--glass-bg); border-radius: 16px; border: 1px solid var(--glass-border);">
			<div style="font-weight: 600; margin-bottom: 8px; color: var(--accent);">Note del giorno</div>
			<textarea id="dayNotes" rows="4" placeholder="Scrivi qui eventuali osservazioni, problemi, misurazioni..." style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.05); color:white; resize:vertical; font-family:inherit;"></textarea>
			<button id="saveNotesBtn" style="margin-top:12px; padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer;">Salva Note</button>
		</div>

		<!-- Pulsante pulizia filtri -->
		<div style="margin-top: 16px; text-align: center;">
			<button id="addFilterCleanBtn" style="padding:10px 16px; background:rgba(105,240,174,0.2); color:var(--success); border:1px solid var(--success); border-radius:12px; font-weight:600; cursor:pointer;">
				✓ Pulizia filtri oggi
			</button>
		</div>
        </section>
    </main>

    <nav>
		<div class="nav-item active" data-target="monthView">
			<div class="nav-icon">📅</div>
			<span>Mese</span>
		</div>
		<div class="nav-item" data-target="dayView">
			<div class="nav-icon">💧</div>
			<span>Giorno</span>
		</div>
		<div class="nav-item" data-target="agendaView">
			<div class="nav-icon">📜</div>
			<span>Agenda</span>
		</div>
	</nav>

    <div class="toast" id="toast">Compito completato!</div>

    <script>
        // --- GESTIONE STATO (LOCALSTORAGE) ---
        
        // Definizione dei compiti
        const tasks = [
            {
                id: 'water',
                title: 'Cambio Acqua',
                desc: '2 tappi e mezzo Flourish Excel',
                period: 'monthly',
                offsetDays: 0 // Prima volta: 1st day, poi ogni 30
            },
            {
				id: 'micro',
				title: 'Dosaggio Flourish',
				desc: 'Microelementi (Ogni 3 giorni)',
				period: 'monthly-days',   // cambiamo period per riconoscerlo
				days: [1,4,7,10,13,16,19,22,25,28]
			},
            {
                id: 'excel',
                title: 'Dosaggio Excel',
                desc: 'Carbonio (Giorni alterni)',
                period: 'alternate',
                // Se il giorno è pari: es. 1, 3, 5...
                pattern: 'odd'
            }
        ];

        function getSchedule() {
            const stored = localStorage.getItem('aquarium_schedule');
            return stored ? JSON.parse(stored) : {};
        }

        function saveSchedule(dateKey, taskData) {
            const all = getSchedule();
            if (!all[dateKey]) all[dateKey] = {};
            all[dateKey] = { ...all[dateKey], ...taskData };
            localStorage.setItem('aquarium_schedule', JSON.stringify(all));
        }

		function saveNotes(dateKey, text) {
			const all = getSchedule();
			if (!all[dateKey]) all[dateKey] = {};
			all[dateKey].notes = text.trim();
			localStorage.setItem('aquarium_schedule', JSON.stringify(all));
		}

		function getNotes(dateKey) {
			const dayData = getSchedule()[dateKey];
			return dayData?.notes || '';
		}

		function markFilterCleaned(dateKey) {
			const all = getSchedule();
			if (!all[dateKey]) all[dateKey] = {};
			all[dateKey].filterCleaned = true;
			localStorage.setItem('aquarium_schedule', JSON.stringify(all));
		}

		function wasFilterCleaned(dateKey) {
			const dayData = getSchedule()[dateKey];
			return !!dayData?.filterCleaned;
		}

        function getTaskStatus(dateKey, taskId) {
            const dayData = getSchedule()[dateKey];
            return dayData ? dayData[taskId] : false;
        }

        // --- FUNZIONI DI SUPPORTO ---

        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        function formatKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // --- LOGICA UI & CALENDARIO ---

        let currentDate = new Date(); // Oggetto Date per navigare tra i mesi
        let selectedDate = new Date(); // Data selezionata

        const daysContainer = document.getElementById('daysContainer');
        const monthLabel = document.getElementById('currentMonthLabel');
        const headerDate = document.getElementById('headerDate');
        const selectedDayLabel = document.getElementById('selectedDayLabel');

        function init() {
			renderHeader();
			renderCalendar();
			
			
			// ── Esporta ────────────────────────────────────────────────
		document.getElementById('exportBtn')?.addEventListener('click', () => {
			const data = localStorage.getItem('aquarium_schedule');
			if (!data || data === '{}') {
				showToastCustom("Non ci sono dati da esportare");
				return;
			}

			const blob = new Blob([data], { type: 'application/json' });
			const url = URL.createObjectURL(blob);
			
			const a = document.createElement('a');
			a.href = url;
			a.download = `acquario-manutenzione-${new Date().toISOString().slice(0,10)}.json`;
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			URL.revokeObjectURL(url);

			showToastCustom("Dati esportati!");
		});

		// ── Importa ────────────────────────────────────────────────
		document.getElementById('importFile')?.addEventListener('change', (e) => {
			const file = e.target.files[0];
			if (!file) return;

			const reader = new FileReader();
			reader.onload = (event) => {
				try {
					const importedData = JSON.parse(event.target.result);
					
					// Controllo basilare (opzionale ma consigliato)
					if (typeof importedData !== 'object' || importedData === null) {
						throw new Error("File non valido");
					}

					localStorage.setItem('aquarium_schedule', JSON.stringify(importedData));
					
					// Ricarica tutto
					renderCalendar();
					if (document.getElementById('dayView').classList.contains('active')) {
						renderDayView();
					}

					showToastCustom("Dati importati con successo!");
				} catch (err) {
					showToastCustom("Errore: file non valido o corrotto");
					console.error(err);
				}
			};
			reader.readAsText(file);

			// Resetta input per permettere di ricaricare lo stesso file
			e.target.value = '';
		});


			// Event Listeners Nav   ← questa parte DEVE rimanere come era prima
			document.querySelectorAll('.nav-item').forEach(item => {
				item.addEventListener('click', () => {
					document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
					document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
					
					item.classList.add('active');
					const targetId = item.getAttribute('data-target');
					document.getElementById(targetId).classList.add('active');
				});
			});

			// Month navigation
			document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
			document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));

			// Listener per salvare le note
			const saveNotesBtn = document.getElementById('saveNotesBtn');
			if (saveNotesBtn) {
				saveNotesBtn.addEventListener('click', () => {
					const notes = document.getElementById('dayNotes')?.value || '';
					const dateKey = formatKey(selectedDate);
					saveNotes(dateKey, notes);
					showToastCustom("Note salvate!");
					renderCalendar();
				});
			}

			// Listener per pulizia filtri
			document.getElementById('addFilterCleanBtn').addEventListener('click', () => {
    const dateKey = formatKey(selectedDate);
    const currentlyCleaned = wasFilterCleaned(dateKey);

    if (currentlyCleaned) {
        // Rimuovi la marcatura
        const all = getSchedule();
        if (all[dateKey]) {
            delete all[dateKey].filterCleaned;
            if (Object.keys(all[dateKey]).length === 0) {
                delete all[dateKey];
            }
            localStorage.setItem('aquarium_schedule', JSON.stringify(all));
        }
        showToastCustom("Pulizia filtri rimossa");
    } else {
        markFilterCleaned(dateKey);
        showToastCustom("Pulizia filtri registrata!");
    }

    renderCalendar();
    renderDayView();  // aggiorna il bottone
});
			
		}

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function renderHeader() {
			const now = new Date();
			
			// Formato: GIOVEDÌ 12 MARZO 2026   19:45:23
			const optionsDate = { 
				weekday: 'long', 
				day: 'numeric', 
				month: 'long', 
				year: 'numeric' 
			};
			
			const dateStr = now.toLocaleDateString('it-IT', optionsDate).toUpperCase();
			const timeStr = now.toLocaleTimeString('it-IT', { 
				hour: '2-digit', 
				minute: '2-digit', 
				second: '2-digit' 
			});
			
			// Orologio con secondi che si aggiorna
			headerDate.innerHTML = `
				${dateStr}<br>
				<span style="font-size: 1.3rem; letter-spacing: 2px; color: var(--accent);">
					${timeStr} 🕒
				</span>
			`;
		}

        function renderCalendar() {
			const year = currentDate.getFullYear();
			const month = currentDate.getMonth();
			
			// Header del mese in italiano
			monthLabel.textContent = new Date(year, month).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' }).toUpperCase();
			daysContainer.innerHTML = '';

			// --- LOGICA ALLINEAMENTO SETTIMANA (Lunedì come primo giorno) ---
			let firstDayIndex = new Date(year, month, 1).getDay(); 
			const adjustedFirstDay = firstDayIndex === 0 ? 7 : firstDayIndex;
			const spacerCount = adjustedFirstDay - 1;

			const daysInMonth = new Date(year, month + 1, 0).getDate();

			// Definizione di "oggi" UNA SOLA VOLTA, con ore azzerate
			const today = new Date();
			today.setHours(0, 0, 0, 0);

			// 1. Spazi vuoti prima del 1° del mese
			for (let i = 0; i < spacerCount; i++) {
				const emptyCell = document.createElement('div');
				emptyCell.className = 'day-cell empty';
				daysContainer.appendChild(emptyCell);
			}

			// 2. Giorni del mese
			for (let d = 1; d <= daysInMonth; d++) {
				const dateObj = new Date(year, month, d);
				const dateKey = formatKey(dateObj);
				
				const isPast = dateObj < today;
				const isTodayCell = isToday(dateObj);

				const cell = document.createElement('div');
				cell.className = `day-cell ${isTodayCell ? 'today' : ''} ${dateKey === formatKey(selectedDate) ? 'selected' : ''}`;
				cell.textContent = d;
				cell.onclick = () => selectDate(dateObj);

				// ────────────────────────────────────────────────────────────────
				// Container superiore: note + filtri puliti
				// ────────────────────────────────────────────────────────────────
				const topIndicators = document.createElement('div');
				topIndicators.style.display = 'flex';
				topIndicators.style.justifyContent = 'center';
				topIndicators.style.gap = '6px';
				topIndicators.style.marginTop = '2px';
				topIndicators.style.fontSize = '0.85rem';
				topIndicators.style.lineHeight = '1';

				if (getNotes(dateKey)) {
					const noteIcon = document.createElement('span');
					noteIcon.textContent = '📝';
					noteIcon.style.fontSize = '0.7rem';
					topIndicators.appendChild(noteIcon);
				}

				if (wasFilterCleaned(dateKey)) {
					const filterIcon = document.createElement('span');
					filterIcon.textContent = '🧽';
					filterIcon.style.fontSize = '0.7rem';
					topIndicators.appendChild(filterIcon);
				}

				if (topIndicators.children.length > 0) {
					cell.appendChild(topIndicators);
				}

				// ────────────────────────────────────────────────────────────────
				// Container inferiore: indicatori task (✓ / ✖ / puntini)
				// ────────────────────────────────────────────────────────────────
				const bottomIndicators = document.createElement('div');
				bottomIndicators.className = 'task-dots';
				bottomIndicators.style.display = 'flex';
				bottomIndicators.style.justifyContent = 'center';
				bottomIndicators.style.gap = '5px';
				bottomIndicators.style.marginTop = '3px';
				bottomIndicators.style.marginBottom = '2px';

				let hasAnyTaskIndicator = false;

				tasks.forEach(task => {
					let shouldShow = false;

					if (task.period === 'monthly') {
						if (d === 1) shouldShow = true;
					} else if (task.period === 'weekly') {
						const dayOfWeek = dateObj.getDay();
						const isoDay = dayOfWeek === 0 ? 7 : dayOfWeek;
						if (task.daysOfWeek.includes(isoDay)) shouldShow = true;
					} else if (task.period === 'alternate') {
						if (d % 2 !== 0) shouldShow = true;
					} else if (task.period === 'monthly-days') {          // ← nuovo ramo
					shouldShow = task.days.includes(d);
				}

					if (shouldShow) {
						hasAnyTaskIndicator = true;

						if (isPast) {
							const status = getTaskStatus(dateKey, task.id);
							const symbol = document.createElement('span');
							symbol.textContent = status ? '✓' : 'X';  // METTERE ✓ SE SI VOGLIONO VISUALIZZARE
							symbol.style.color = status ? 'var(--success)' : 'var(--danger)';
							symbol.style.fontSize = '0.50rem';
							symbol.style.fontWeight = '800';
							bottomIndicators.appendChild(symbol);
						} else {
							// Oggi o futuro
							const isCompleted = getTaskStatus(dateKey, task.id);

							if (isCompleted) {
								const check = document.createElement('span');
								check.textContent = '✓';
								check.style.color = 'var(--success)';
								check.style.fontSize = '0.6rem';
								check.style.fontWeight = 'bold';
								bottomIndicators.appendChild(check);
							} else {
								// Ancora da fare → icona del task
								let taskIcon = '';
								
								if (task.id === 'micro') {
									taskIcon = '🌱';   // Flourish microelementi
								} else if (task.id === 'excel') {
									taskIcon = '🧪';   // Excel carbonio
								} else if (task.id === 'water') {
									taskIcon = '🚿';   // Cambio acqua (opzionale, se vuoi differenziarlo)
								}

								if (taskIcon) {
									const iconElem = document.createElement('span');
									iconElem.textContent = taskIcon;
									iconElem.style.fontSize = '0.6rem';          // DIMENSIONE MISURE ICONE un po' più grande per visibilità
									iconElem.style.lineHeight = '1';
									bottomIndicators.appendChild(iconElem);
								} else {
									// Fallback per eventuali altri task futuri
									const dot = document.createElement('div');
									dot.className = 'future-dot';
									bottomIndicators.appendChild(dot);
								}
							}
						}
					}
				});

				// Aggiungiamo il container solo se ci sono indicatori task
				if (hasAnyTaskIndicator && bottomIndicators.children.length > 0) {
					cell.appendChild(bottomIndicators);
				}

				// Aggiungiamo la cella al contenitore
				daysContainer.appendChild(cell);
			}
		}
		
        function selectDate(date) {
            selectedDate = date;
            renderCalendar(); // To update selection highlight
            renderDayView();
            
            // Switch tab to day view automatically
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('[data-target="dayView"]').classList.add('active');
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('dayView').classList.add('active');
        }

        function renderDayView() {
			const dateKey = formatKey(selectedDate);   // ← unica dichiarazione qui
			selectedDayLabel.textContent = selectedDate.toLocaleDateString('it-IT', { 
				weekday: 'long', 
				day: 'numeric', 
				month: 'long' 
			});
			
			const container = document.getElementById('taskList');
			container.innerHTML = '';

			tasks.forEach(task => {
				let shouldShow = false;

				if (task.period === 'monthly') {
					const diffTime = Math.abs(selectedDate - new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1));
					const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
					if (diffDays === 0 || (diffDays > 0 && diffDays % 30 === 0)) shouldShow = true;
				} 
				else if (task.period === 'weekly') {
					const dayOfWeek = selectedDate.getDay();
					const adjustedDay = dayOfWeek === 0 ? 7 : dayOfWeek;
					if (task.daysOfWeek.includes(adjustedDay)) shouldShow = true;
				}
				else if (task.period === 'alternate') {
					if (selectedDate.getDate() % 2 !== 0) shouldShow = true;
				}
				else if (task.period === 'monthly-days') {
					shouldShow = task.days.includes(selectedDate.getDate());
				}

				if (shouldShow) {
					const completed = getTaskStatus(dateKey, task.id);
					const card = document.createElement('div');
					card.className = `task-card ${completed ? 'completed' : ''}`;
					
					card.innerHTML = `
						<div class="task-icon">
							${task.period === 'monthly' ? '🚿' : task.period === 'weekly' ? '🥣' : '🧪'}
						</div>
						<div class="task-info">
							<div class="task-title">${task.title}</div>
							<div class="task-desc">${task.desc}</div>
						</div>
						<div class="check-btn" onclick="toggleTask('${dateKey}', '${task.id}', this)">
							${completed ? '✓' : ''}
						</div>
					`;
					container.appendChild(card);
				}
			});

			// ── Qui usiamo la variabile dateKey già esistente ──
			document.getElementById('dayNotes').value = getNotes(dateKey);

			// Mostra se filtri puliti oggi
			const filterBtn = document.getElementById('addFilterCleanBtn');
			const isCleaned = wasFilterCleaned(dateKey);

			if (isCleaned) {
				filterBtn.textContent = "Filtri puliti ✓ (clicca per rimuovere)";
				filterBtn.style.background = 'rgba(105,240,174,0.4)';
				filterBtn.style.color = 'var(--success)';
				filterBtn.style.borderColor = 'var(--success)';
			} else {
				filterBtn.textContent = "✓ Pulizia filtri oggi";
				filterBtn.style.background = 'rgba(105,240,174,0.2)';
				filterBtn.style.color = 'var(--success)';
				filterBtn.style.borderColor = 'var(--success)';
			}
			filterBtn.disabled = false;  // sempre cliccabile ora
		}

		function renderAgendaView() {
			const container = document.getElementById('agendaList');
			container.innerHTML = '';

			const today = new Date();
			today.setHours(0, 0, 0, 0);

			// Mostra i prossimi 31 giorni (o più/meno, decidi tu)
			for (let offset = -3; offset <= 30; offset++) {  // da 3 giorni fa a 60 giorni dopo
				const dateObj = new Date(today);
				dateObj.setDate(today.getDate() + offset);
				const dateKey = formatKey(dateObj);
				const isPast = dateObj < today;
				const isToday = offset === 0;

				const dayCard = document.createElement('div');
				dayCard.style.cssText = `
					background: var(--glass-bg);
					backdrop-filter: blur(10px);
					border: 1px solid var(--glass-border);
					border-radius: 16px;
					margin: 12px 0;
					padding: 16px;
					display: flex;
					align-items: flex-start;
					gap: 16px;
					transition: all 0.2s;
				`;

				if (isToday) {
					dayCard.style.borderColor = 'var(--accent)';
					dayCard.style.boxShadow = '0 0 15px rgba(0,229,255,0.3)';
				}

				// Colonna sinistra: numero giorno + nome giorno
				const leftCol = document.createElement('div');
				leftCol.style.cssText = `
					min-width: 70px;
					text-align: center;
					padding: 8px 0;
				`;

				const dayNum = document.createElement('div');
				dayNum.textContent = dateObj.getDate();
				dayNum.style.cssText = `
					font-size: 2.2rem;
					font-weight: 700;
					line-height: 1;
					color: ${isToday ? 'var(--accent)' : 'white'};
				`;

				const dayName = document.createElement('div');
				dayName.textContent = dateObj.toLocaleDateString('it-IT', { weekday: 'short' }).toUpperCase();
				dayName.style.cssText = `
					font-size: 0.9rem;
					color: var(--text-muted);
					margin-top: 4px;
				`;

				leftCol.appendChild(dayNum);
				leftCol.appendChild(dayName);

				// Colonna destra: contenuto (icone task + note + filtri)
				const rightCol = document.createElement('div');
				rightCol.style.flex = '1';

				// Indicatori task
				const indicators = document.createElement('div');
				indicators.style.display = 'flex';
				indicators.style.flexWrap = 'wrap';
				indicators.style.gap = '8px';
				indicators.style.marginBottom = '8px';

				let hasAny = false;

				tasks.forEach(task => {
					let shouldShow = false;

					if (task.period === 'monthly') {
						if (dateObj.getDate() === 1) shouldShow = true;
					} else if (task.period === 'weekly') {
						const dow = dateObj.getDay();
						const adj = dow === 0 ? 7 : dow;
						if (task.daysOfWeek.includes(adj)) shouldShow = true;
					} else if (task.period === 'alternate') {
						if (dateObj.getDate() % 2 !== 0) shouldShow = true;
					} else if (task.period === 'monthly-days') {
						shouldShow = task.days.includes(dateObj.getDate());
					}

					if (shouldShow) {
						hasAny = true;
						const completed = getTaskStatus(dateKey, task.id);

						let iconElem;
						if (completed) {
							iconElem = document.createElement('span');
							iconElem.textContent = '✓';
							iconElem.style.color = 'var(--success)';
							iconElem.style.fontSize = '1.1rem';
							iconElem.style.fontWeight = 'bold';
						} else {
							iconElem = document.createElement('span');
							if (task.id === 'water') iconElem.textContent = '🚿 Cambio acqua';
							else if (task.id === 'micro') iconElem.textContent = '🥣 Micronutrienti Flourish';
							else if (task.id === 'excel') iconElem.textContent = '🧪 CO₂ Excel';
							iconElem.style.fontSize = '1.3rem';
						}
						indicators.appendChild(iconElem);
					}
				});

				if (hasAny) rightCol.appendChild(indicators);

				// Note
				const notes = getNotes(dateKey);
				if (notes) {
					const noteBox = document.createElement('div');
					noteBox.style.cssText = `
						background: rgba(255,255,255,0.05);
						border: 1px dashed var(--glass-border);
						border-radius: 12px;
						padding: 10px;
						font-size: 0.9rem;
						color: var(--text-muted);
						margin-top: 8px;
					`;
					noteBox.textContent = notes;
					rightCol.appendChild(noteBox);
				}

				// Filtri puliti
				if (wasFilterCleaned(dateKey)) {
					const filterTag = document.createElement('div');
					filterTag.textContent = '🧼 Filtri puliti!';
					filterTag.style.cssText = `
						display: inline-block;
						background: rgba(178,255,255,0.4);
						color: var(--success);
						padding: 4px 12px;
						border-radius: 20px;
						font-size: 1.85rem;
						margin-top: 8px;
					`;
					rightCol.appendChild(filterTag);
				}

				dayCard.appendChild(leftCol);
				dayCard.appendChild(rightCol);
				container.appendChild(dayCard);
				dayCard.onclick = () => selectDate(dateObj);
			}
		}


        function toggleTask(dateKey, taskId, btnElement) {
			const card = btnElement.parentElement;
			card.classList.toggle('completed');
			btnElement.textContent = card.classList.contains('completed') ? '✓' : '';

			saveSchedule(dateKey, { [taskId]: card.classList.contains('completed') });
			showToastCustom("Task Completato e salvato!");

			// ← AGGIUNTA: aggiorna il calendario se la data selezionata è nel mese corrente visualizzato
			const selectedYear  = selectedDate.getFullYear();
			const selectedMonth = selectedDate.getMonth();
			const currentYear   = currentDate.getFullYear();
			const currentMonth  = currentDate.getMonth();

			if (selectedYear === currentYear && selectedMonth === currentMonth) {
				renderCalendar();
			}
		}

        function createBubbles() {
            const container = document.getElementById('bubbles');
            for(let i=0; i<10; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 40 + 10;
                b.style.width = `${size}px`;
                b.style.height = `${size}px`;
                b.style.left = `${Math.random() * 100}%`;
                b.style.top = `${Math.random() * 100}%`;
                b.style.animationDelay = `${Math.random() * 5}s`;
                b.style.animationDuration = `${Math.random() * 5 + 5}s`;
                container.appendChild(b);
            }
        }
		function showToastCustom(message) {
			const toast = document.getElementById('toast');
			toast.textContent = message;
			toast.style.background = 'rgba(105, 240, 174, 0.9)';
			toast.style.color = '#003300';
			toast.classList.add('show');
			setTimeout(() => {
				toast.classList.remove('show');
				// ripristina testo default dopo
				setTimeout(() => toast.textContent = 'Compito completato!', 500);
			}, 2200);
		}
        // Avvio
        createBubbles();
        init();
		
		
		// Forza apertura su "Oggi" all'avvio
		window.addEventListener('load', () => {
			selectedDate = new Date();          // oggi
			selectedDate.setHours(0,0,0,0);     // azzera ora per coerenza

			// Aggiorna highlight nel calendario mese
			renderCalendar();

			// Apri direttamente la vista Giorno
			document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
			document.querySelector('[data-target="dayView"]').classList.add('active');
			
			document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
			document.getElementById('dayView').classList.add('active');

			// Renderizza i task di oggi
			renderDayView();
		});


		// Gestione tasto back del browser/cellulare
		window.addEventListener('popstate', (event) => {
			if (document.getElementById('dayView').classList.contains('active')) {
				// Se siamo nella vista giorno → torniamo al mese
				document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
				document.querySelector('[data-target="monthView"]').classList.add('active');
				
				document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
				document.getElementById('monthView').classList.add('active');
				
				// Impediamo il back reale della pagina (opzionale)
				history.pushState(null, '', window.location.href);
			}
		});

		// Inizializza history per intercettare il primo back
		history.pushState(null, '', window.location.href);
		
		// Event Listeners Nav (aggiorna se necessario)
		document.querySelectorAll('.nav-item').forEach(item => {
			item.addEventListener('click', () => {
				document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
				document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
				
				item.classList.add('active');
				const targetId = item.getAttribute('data-target');
				document.getElementById(targetId).classList.add('active');

				// Se selezionata Agenda → renderizzala
				if (targetId === 'agendaView') {
					renderAgendaView();
				}
			});
		});


		// ────────────────────────────────────────────────────────────────
		// Notifica mattutina alle 8:15 se ci sono task da fare
		// ────────────────────────────────────────────────────────────────
		let notificationPermission = 'default';

		// Chiedi permesso notifiche all'apertura (solo una volta)
		if ('Notification' in window && Notification.permission !== 'denied') {
			Notification.requestPermission().then(perm => {
				notificationPermission = perm;
			});
		}

		// Funzione per riprodurre un suono semplice (beep)
		function playMorningBeep() {
			const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			const oscillator = audioCtx.createOscillator();
			oscillator.type = 'sine';
			oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
			oscillator.connect(audioCtx.destination);
			oscillator.start();
			oscillator.stop(audioCtx.currentTime + 0.4); // beep breve
		}

		// Controlla ogni 60 secondi se sono circa le 8:15
		setInterval(() => {
			const now = new Date();
			const hours = now.getHours();
			const minutes = now.getMinutes();

			// Finestra 8:15–8:20 per non disturbare troppo
			if (hours === 8 && minutes >= 15 && minutes <= 20) {
				// Controlla se oggi ci sono task da fare (non completati)
				const todayKey = formatKey(now);
				let hasPendingTasks = false;

				tasks.forEach(task => {
					let shouldShowToday = false;
					// stessa logica di shouldShow che usi in renderDayView
					if (task.period === 'monthly') {
						if (now.getDate() === 1) shouldShowToday = true;
					} else if (task.period === 'weekly') {
						const dow = now.getDay();
						const adj = dow === 0 ? 7 : dow;
						if (task.daysOfWeek?.includes(adj)) shouldShowToday = true;
					} else if (task.period === 'alternate') {
						if (now.getDate() % 2 !== 0) shouldShowToday = true;
					} else if (task.period === 'monthly-days') {
						shouldShowToday = task.days.includes(now.getDate());
					}

					if (shouldShowToday && !getTaskStatus(todayKey, task.id)) {
						hasPendingTasks = true;
					}
				});

				if (hasPendingTasks) {
					// Suono
					playMorningBeep();

					// Toast visibile
					showToastCustom("Buongiorno! Oggi hai manutenzione da fare 🌱");

					// Notifica push se permesso concesso
					if (notificationPermission === 'granted') {
						new Notification("Manutenzione Acquario", {
							body: "Oggi ci sono dosaggi o cambi da fare. Apri l'app!",
							icon: "/icon-192.png" // metti un'icona se ne hai una
						});
					}
				}
			}
		}, 60000); // ogni minuto
		
		// Aggiorna orologio in tempo reale
		setInterval(renderHeader, 1000);
    </script>
